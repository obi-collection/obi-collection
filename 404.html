<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | US Hip Hop · Japanese Pressings</title>
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --gold-primary: #FFD700;
    --gold-muted: #D4AF37;
    --black: #0A0A0A;
    --dark-gray: #1A1A1A;
    --medium-gray: #2A2A2A;
    --charcoal: #333333;
    --silver: #808080;
    --white: #F5F5F5;
    --off-white: #E8E8E8;
    --font-title: 'Bebas Neue', sans-serif;
    --font-heading: 'Oswald', sans-serif;
    --font-body: 'Roboto Condensed', sans-serif;
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.7);
}
body {
    font-family: var(--font-body);
    background: linear-gradient(135deg, var(--black) 0%, var(--charcoal) 100%);
    background-attachment: fixed;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}
header {
    background: linear-gradient(180deg, var(--dark-gray) 0%, var(--medium-gray) 100%);
    border-bottom: 2px solid var(--gold-primary);
    padding: 0.75rem 1rem 0.5rem;
    box-shadow: var(--shadow-lg);
    text-align: center;
}
.site-title {
    font-family: var(--font-title);
    font-size: 2.5rem;
    color: var(--gold-primary);
    text-shadow: 2px 2px 0 var(--silver), 3px 3px 0 var(--black);
    letter-spacing: 3px;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
}
.site-title i { animation: spin 4s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
}
.error-box {
    text-align: center;
    max-width: 480px;
    width: 100%;
}
.error-code {
    font-family: var(--font-title);
    font-size: 8rem;
    color: var(--gold-primary);
    text-shadow: 4px 4px 0 var(--silver), 6px 6px 0 var(--black);
    letter-spacing: 8px;
    line-height: 1;
    margin-bottom: 1rem;
}
.error-title {
    font-family: var(--font-heading);
    font-size: 1.6rem;
    color: var(--off-white);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
}
.error-subtitle {
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--silver);
    margin-bottom: 2.5rem;
}
.home-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 2rem;
    background: var(--gold-primary);
    color: var(--black);
    font-family: var(--font-heading);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-decoration: none;
    border-radius: 4px;
    transition: background 0.2s, transform 0.2s;
    min-height: 44px;
}
.home-btn:hover { background: var(--gold-muted); transform: translateY(-2px); }
@media (max-width: 480px) {
    .site-title { font-size: 1.5rem; letter-spacing: 0.5px; }
    .error-code { font-size: 5rem; letter-spacing: 4px; }
    .error-title { font-size: 1.2rem; }
}
    </style>
</head>
<body>
    <header>
        <a href="/" class="site-title">
            <i class="fas fa-compact-disc"></i>
            US Hip Hop · Japanese Pressings
        </a>
    </header>
    <main>
        <div class="error-box">
            <div class="error-code">404</div>
            <div class="error-title">Page Not Found</div>
            <div class="error-subtitle">お探しのページは見つかりませんでした</div>
            <a href="/" class="home-btn">
                <i class="fas fa-home"></i>
                トップページへ戻る
            </a>
        </div>
    </main>
</body>
</html>
