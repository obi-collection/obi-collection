<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="日本盤OBI付きヒップホップCDコレクション - 600以上のゴールデンエイジ・ヒップホップアルバムを収録。検索・フィルター機能付き。">
    <meta name="keywords" content="Japanese OBI, Hip Hop CDs, Japanese Press, OBI Strip Collection, Japanese Hip Hop, Japanese Import CDs, OBI帯, Hip Hop Japan, Rare Hip Hop CDs, Japanese CD Collection">
    <meta property="og:type" content="website">
    <meta property="og:title" content="US Hip Hop · Japanese Pressings">
    <meta property="og:description" content="A CD collection with OBI strips — 600+ US hip hop albums on Japanese pressings.">
    <meta property="og:image" content="https://res.cloudinary.com/dyfylaino/image/upload/v1775984820/ogp_banner.png">
    <meta property="og:url" content="https://obi-collection.github.io/obi-collection/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://res.cloudinary.com/dyfylaino/image/upload/v1775984820/ogp_banner.png">
    <title>US Hip Hop · Japanese Pressings</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Oswald:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html" id="homeLink" style="text-decoration:none;color:inherit;display:contents;">
                    <h1 class="site-title">
                        <i class="fas fa-compact-disc"></i>
                        US Hip Hop · Japanese Pressings
                    </h1>
                </a>
            </div>
            <div class="control-bar">
                <div class="control-row control-row-1">
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" title="Grid"><i class="fas fa-th"></i></button>
                        <button class="view-btn" data-view="list" title="List"><i class="fas fa-list"></i></button>
                    </div>
                    <select id="sortSelect" class="compact-select">
                        <option value="artist-asc">A→Z</option>
                        <option value="year-asc">Oldest</option>
                        <option value="year-desc">Newest</option>
                    </select>
                    <select id="alphabetSelect" class="compact-select">
                        <option value="">All Artists</option>
                        <option value="1980s">1980s</option>
                        <option value="1990s">1990s</option>
                        <option value="2000s">2000s</option>
                        <option value="2010s">2010s</option>
                        <option value="2020s">2020s</option>
                        <option disabled>─────</option>
                        <option value="soundtrack">O.S.T.</option>
                        <option value="compilation">Compilation</option>
                        <option value="r&b">R&amp;B</option>
                        <option value="souljazz">Soul &amp; Jazz</option>
                        <option disabled>─────</option>
                        <option value="number">#</option>
                        <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                        <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                        <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                        <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                        <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                        <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                        <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                        <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                        <option value="Y">Y</option><option value="Z">Z</option>
                    </select>
                </div>
                <div class="control-row control-row-2">
                    <input type="text" id="searchInput" placeholder="Artist, Album, Year..." class="compact-search">
                    <button class="compact-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <div class="control-row control-row-3">
                    <div class="compact-count">
                        <i class="fas fa-compact-disc"></i>
                        <span id="resultCount">0</span>/<span id="totalCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="alphaIndexBar" style="display:none;">
        <div class="alpha-index-inner" id="alphaIndexInner"></div>
    </div>
    <main class="main-content">
        <div class="collection-container" id="collectionContainer"></div>
        <div class="view-size-toggle" id="viewSizeToggle">
            <button class="size-btn active" data-size="mobile"><i class="fas fa-mobile-alt"></i> Mobile</button>
            <button class="size-btn" data-size="desktop"><i class="fas fa-desktop"></i> Desktop</button>
            <button class="compact-btn" id="randomAlbumBtn" title="Random Album"><i class="fas fa-dice"></i></button>
            <button class="compact-btn" id="randomBtn" title="Back to Top"><i class="fas fa-random"></i></button>
        </div>
        <div class="loading-spinner" id="loadingSpinner">
            <i class="fas fa-compact-disc fa-spin"></i>
            <p>Loading...</p>
        </div>
        <div class="no-results" id="noResults" style="display:none;">
            <i class="fas fa-search"></i>
            <p>No CDs found</p>
        </div>
    </main>

    <div class="x-share-overlay" id="xShareOverlay">
        <img id="xShareImage" src="" alt="">
        <p>長押しして画像を保存してください</p>
        <button class="x-share-ok-btn" id="xShareOkBtn">OK</button>
    </div>

    <div class="modal" id="albumModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
