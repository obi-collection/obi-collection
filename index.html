* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    /* OBI color system */
    --gold-obi: #F5C518;
    --gold-bright: #F9D040;
    --gold-dim: #A08000;
    /* Backgrounds */
    --black: #0A0A0A;
    --ink: #111111;
    --surface-0: #161616;
    --surface-1: #1E1E1E;
    --surface-2: #252525;
    --border-subtle: #2C2C2C;
    --border-mid: #3A3A3A;
    /* Text */
    --text-primary: #F0EDE6;
    --text-secondary: #9A9080;
    --text-muted: #5C5650;
    /* Legacy aliases */
    --gold-primary: #F5C518;
    --gold-dark: #A08000;
    --gold-muted: #F5C518;
    --dark-gray: #1E1E1E;
    --medium-gray: #252525;
    --light-gray: #3A3A3A;
    --lighter-gray: #4A4040;
    --silver: #9A9080;
    --light-silver: #B0A898;
    --charcoal: #252525;
    --white: #F0EDE6;
    --off-white: #E8E4DC;
    --font-title: 'Barlow Condensed', Impact, sans-serif;
    --font-heading: 'Oswald', sans-serif;
    --font-body: 'Roboto Condensed', sans-serif;
    --spacing-xs: 0.5rem;
    --spacing-sm: 1rem;
    --spacing-md: 1.5rem;
    --spacing-lg: 2.5rem;
    --spacing-xl: 4rem;
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.7);
    --shadow-gold: 0 0 20px rgba(245,197,24,0.15);
    --shadow-gold-strong: 0 0 30px rgba(245,197,24,0.3);
}
body {
    font-family: var(--font-body);
    background: var(--ink);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
}
.site-header {
    background: var(--surface-1);
    border-bottom: 1px solid var(--border-subtle);
    box-shadow: 0 1px 0 var(--gold-dim), 0 4px 20px rgba(0,0,0,0.5);
    padding: 1.25rem 2rem 1rem;
    position: sticky;
    top: 0;
    z-index: 1000;
}
.header-container { max-width: 1440px; margin: 0 auto; }
.logo-section { text-align: center; margin-bottom: 0.75rem; }
.site-title {
    font-family: var(--font-title);
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 800;
    color: var(--gold-obi);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
}
.site-title i { color: var(--gold-obi); font-size: 0.7em; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.control-bar {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
}
.control-row { display: flex; gap: 0.5rem; align-items: center; }
.control-row-1 { flex: 0 0 auto; }
.control-row-2 { flex: 1; min-width: 250px; }
.control-row-3 { flex: 0 0 auto; }
.compact-select {
    padding: 0.5rem 0.6rem;
    background: var(--surface-0);
    border: 1px solid var(--border-mid);
    color: var(--gold-obi);
    font-family: var(--font-heading);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
}
.compact-select:focus { outline: none; border-color: var(--gold-obi); box-shadow: 0 0 0 2px rgba(245,197,24,0.12); }
.compact-search {
    flex: 1;
    padding: 0.5rem 0.75rem;
    background: var(--surface-0);
    border: 1px solid var(--border-mid);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.85rem;
    border-radius: 4px;
    transition: all 0.2s ease;
    min-width: 0;
}
.compact-search:focus { outline: none; border-color: var(--gold-obi); box-shadow: 0 0 0 2px rgba(245,197,24,0.12); }
.compact-search::placeholder { color: var(--text-muted); }
.compact-btn {
    padding: 0.5rem 0.7rem;
    background: var(--surface-0);
    border: 1px solid var(--border-mid);
    color: var(--text-secondary);
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}
.compact-btn:hover { border-color: var(--gold-obi); color: var(--gold-obi); transform: translateY(-1px); }
.view-toggle {
    display: flex;
    gap: 0;
    background: var(--surface-0);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border-mid);
}
.view-btn {
    padding: 0.5rem 0.6rem;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
}
.view-btn:hover { color: var(--text-primary); }
.view-btn.active { background: var(--gold-obi); color: var(--black); }
.compact-count {
    color: var(--gold-obi);
    font-family: var(--font-heading);
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem 0.7rem;
    background: var(--surface-0);
    border: 1px solid var(--border-mid);
    border-radius: 4px;
}
.main-content {
    max-width: 1440px;
    margin: var(--spacing-md) auto var(--spacing-xl);
    padding: 0 clamp(1rem, 3vw, 3rem);
}
.collection-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
    margin-top: var(--spacing-lg);
}
.view-size-toggle {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    margin: 2rem 0;
    padding: 1rem 0;
}
.view-size-toggle .compact-btn {
    padding: 0.5rem 1rem;
    font-size: 1.1rem;
    border-radius: 4px;
    border: 1px solid var(--border-mid);
    background: var(--surface-0);
}
.size-btn {
    padding: 0.5rem 1rem;
    background: var(--surface-0);
    border: 1px solid var(--border-mid);
    color: var(--text-secondary);
    font-family: var(--font-heading);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 0.4rem;
}
.size-btn:hover { border-color: var(--gold-obi); color: var(--gold-obi); }
.size-btn.active { background: var(--gold-obi); border-color: var(--gold-obi); color: var(--black); }
/* ===== ALBUM CARD ===== */
.album-card {
    position: relative;
    background: var(--surface-0);
    border: 1px solid var(--border-mid);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: var(--shadow-md);
    transition: border-color 0.2s ease;
}
.album-card:hover {
    border-color: var(--gold-obi);
}
.album-image-container {
    position: relative;
    width: 100%;
    padding-top: 100%;
    overflow: hidden;
    background: var(--black);
    border-radius: 4px 4px 0 0;
}
/* Dark gradient overlay on hover */
.album-image-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 45%, rgba(0,0,0,0.88) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 2;
}
.album-card:hover .album-image-container::after { opacity: 1; }
.version-badge { display: none; }
.pin-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--gold-obi);
    color: var(--text-secondary);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
    font-size: 9px;
    opacity: 0.45;
}
.pin-btn:hover { background: rgba(0,0,0,0.9); color: var(--gold-obi); transform: scale(1.1); opacity: 0.9; }
.pin-btn.pinned { background: var(--gold-obi); color: var(--black); border-color: var(--gold-dim); opacity: 0.85; }
.pin-btn i { transform: rotate(45deg); }
.pin-btn.pinned i { transform: rotate(0deg); }
.album-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
/* album-info hidden in grid view */
.collection-container:not(.list-view) .album-info { display: none; }
/* List view */
.collection-container.list-view { grid-template-columns: 1fr !important; gap: 0.5rem; }
.collection-container.list-view .album-card {
    display: flex;
    flex-direction: row;
    align-items: center;
    background: var(--surface-1);
    border: 1px solid var(--border-mid);
    border-left: 3px solid transparent;
    border-radius: 6px;
    transition: border-left-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    will-change: auto;
}
.collection-container.list-view .album-card:hover {
    transform: translateX(4px) scale(1);
    border-color: var(--border-mid);
    border-left-color: var(--gold-obi);
    background: var(--surface-2);
    box-shadow: var(--shadow-md);
}
.collection-container.list-view .album-image-container { width: 100px; padding-top: 0; height: 100px; flex-shrink: 0; border-radius: 4px 0 0 4px; overflow: hidden; }
.collection-container.list-view .album-image { position: static; width: 100%; height: 100%; object-fit: cover; }
.collection-container.list-view .album-image-container::after { display: none; }
.collection-container.list-view .album-info {
    flex: 1;
    display: flex !important;
    flex-direction: column;
    justify-content: center;
    padding: 0.75rem 1.25rem;
    min-width: 0;
    position: static;
    opacity: 1;
    transform: none;
    transition: none;
}
.collection-container.list-view .album-artist { font-size: 0.95rem; margin-bottom: 0.15rem; }
.collection-container.list-view .album-title { font-size: 0.85rem; font-weight: 700; color: var(--gold-obi); margin-bottom: 0.25rem; }
.collection-container.list-view .album-meta { font-size: 0.75rem; }
.album-artist {
    font-family: var(--font-heading);
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold-obi);
    margin-bottom: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.album-title {
    font-size: 0.75rem;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.album-meta { display: flex; gap: var(--spacing-sm); flex-wrap: wrap; font-size: 0.75rem; color: var(--text-secondary); }
.loading-spinner { text-align: center; padding: var(--spacing-xl); color: var(--gold-obi); }
.loading-spinner i { font-size: 3rem; margin-bottom: var(--spacing-sm); }
.loading-spinner p { font-family: var(--font-heading); font-size: 1.2rem; color: var(--text-secondary); }
.no-results { text-align: center; padding: var(--spacing-xl); color: var(--text-secondary); }
.no-results i { font-size: 3rem; margin-bottom: var(--spacing-sm); }
.no-results p { font-family: var(--font-heading); font-size: 1.2rem; }
/* ===== MODAL ===== */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; padding: 0.5rem; overflow-y: auto; }
.modal.active { display: block; }
.modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(6px); }
.modal-content {
    position: relative;
    max-width: 900px;
    margin: 1rem auto;
    background: var(--surface-1);
    border: 1px solid var(--border-mid);
    border-top: 3px solid var(--gold-obi);
    border-radius: 8px;
    max-height: 97vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(245,197,24,0.1);
    animation: modalRise 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalRise { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--surface-2);
    border: 1px solid var(--border-mid);
    color: var(--text-secondary);
    font-size: 1.2rem;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
}
.modal-close:hover { border-color: var(--gold-obi); color: var(--gold-obi); transform: rotate(90deg); }
.modal-body { padding: 1.25rem; }
.modal-album-container { display: flex; flex-direction: column; gap: 0.75rem; }
.modal-album-header { text-align: center; padding-bottom: 0.75rem; border-bottom: 1px solid var(--gold-dim); }
.modal-album-header h2 { font-family: var(--font-title); font-size: 2.2rem; font-weight: 800; color: var(--gold-obi); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.15em; }
.modal-album-header h3 { font-family: var(--font-body); font-size: 1.2rem; font-weight: 700; color: var(--text-primary); }
.version-section { padding: 0.25rem 0; }
.version-divider { border-top: 1px solid var(--border-subtle); margin-top: var(--spacing-lg); padding-top: var(--spacing-lg); }
.version-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 0.75rem; align-items: start; }
.version-info { display: flex; flex-direction: column; gap: var(--spacing-sm); }
.version-image-wrapper { width: 100%; }
.modal-album-image { width: 100%; max-height: 45vh; object-fit: contain; border-radius: 6px; border: 1px solid var(--border-mid); box-shadow: var(--shadow-lg); cursor: pointer; -webkit-user-select: none; user-select: none; transition: border-color 0.2s ease; }
.modal-album-image:hover { border-color: var(--gold-obi); }
.version-details { display: flex; flex-direction: column; gap: 0; }
.detail-row { display: flex; padding: 0.5rem 0; border-bottom: 1px solid var(--border-subtle); }
.detail-label { font-family: var(--font-heading); font-weight: 700; color: var(--gold-obi); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; width: 120px; flex-shrink: 0; padding-top: 0.1rem; }
.detail-value { color: var(--text-primary); flex: 1; font-size: 0.9rem; }
/* ===== ACTION BUTTONS ===== */
.action-buttons { margin-top: 0; margin-bottom: 0; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.4rem; width: 100%; }
.action-btn { padding: 0.6rem 1rem; border: 1px solid transparent; font-family: var(--font-heading); font-size: 0.9rem; font-weight: 700; cursor: pointer; border-radius: 4px; transition: all 0.25s ease; display: flex; align-items: center; gap: 0.5rem; justify-content: center; white-space: nowrap; width: 100%; }
.action-btn.apple-music { background: var(--gold-obi); border-color: var(--gold-obi); color: var(--black); }
.action-btn.apple-music:hover { background: var(--gold-bright); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,197,24,0.3); }
.action-btn.youtube { background: var(--gold-obi); border-color: var(--gold-obi); color: var(--black); }
.action-btn.youtube:hover { background: var(--gold-bright); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,197,24,0.3); }
.action-btn.discogs { background: transparent; border-color: var(--border-mid); color: var(--text-secondary); }
.action-btn.discogs:hover { border-color: var(--gold-dim); color: var(--gold-obi); background: rgba(245,197,24,0.06); transform: translateY(-2px); }
.action-btn.genius { background: transparent; border-color: var(--border-mid); color: var(--text-secondary); }
.action-btn.genius:hover { border-color: var(--gold-dim); color: var(--gold-obi); background: rgba(245,197,24,0.06); transform: translateY(-2px); }
.action-btn.mercari { background: transparent; border-color: var(--border-mid); color: var(--text-secondary); }
.action-btn.mercari:hover { border-color: var(--gold-dim); color: var(--gold-obi); background: rgba(245,197,24,0.06); transform: translateY(-2px); }
.action-btn.yahooauction { background: transparent; border-color: var(--border-mid); color: var(--text-secondary); }
.action-btn.yahooauction:hover { border-color: var(--gold-dim); color: var(--gold-obi); background: rgba(245,197,24,0.06); transform: translateY(-2px); }
.action-btn.whosampled { background: transparent; border-color: var(--border-mid); color: var(--text-secondary); }
.action-btn.whosampled:hover { border-color: var(--gold-dim); color: var(--gold-obi); background: rgba(245,197,24,0.06); transform: translateY(-2px); }
.action-btn.x-share { background: transparent; border-color: var(--border-mid); color: var(--text-secondary); }
.action-btn.x-share:hover { border-color: var(--gold-dim); color: var(--gold-obi); background: rgba(245,197,24,0.06); transform: translateY(-2px); }
.action-btn.claude-ai { background: transparent; border-color: var(--border-mid); color: #D97757; }
.action-btn.claude-ai:hover { background: rgba(217,119,87,0.1); transform: translateY(-2px); }
.action-btn.ask-ai { background: transparent; border-color: var(--border-mid); color: #D97757; }
.action-btn.ask-ai:hover { background: rgba(217,119,87,0.1); transform: translateY(-2px); }
.action-btn.ask-ai.copied { border-color: #4CAF50; color: #4CAF50; }
.x-share-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; background: rgba(0,0,0,0.96); flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; gap: 1.2rem; }
.x-share-overlay.active { display: flex; }
.x-share-overlay img { max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: 6px; border: 1px solid var(--border-mid); box-shadow: var(--shadow-lg); }
.x-share-overlay p { color: var(--text-primary); font-family: var(--font-body); font-size: 1.1rem; text-align: center; margin: 0; }
.x-share-ok-btn { background: var(--surface-1); border: 1px solid var(--border-mid); color: var(--text-primary); font-family: var(--font-heading); font-size: 1rem; font-weight: 700; padding: 0.75rem 2.5rem; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; }
.x-share-ok-btn:hover { background: var(--surface-2); border-color: var(--gold-obi); }
/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-obi); }
/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    .site-header { padding: 0.75rem 0.75rem 0.5rem; }
    .site-title { font-size: 1.3rem; letter-spacing: 0.08em; }
    .control-bar { flex-direction: column; gap: 0.6rem; width: 100%; }
    .control-row { width: 100%; justify-content: space-between; }
    .control-row-1 { order: 1; justify-content: flex-end; }
    .control-row-2 { order: 2; min-width: 0; }
    .control-row-3 { order: 3; justify-content: flex-end; }
    .compact-select { padding: 0.6rem 0.75rem; font-size: 0.9rem; min-height: 44px; }
    .compact-search { padding: 0.65rem 0.85rem; font-size: 1rem; min-height: 44px; }
    .compact-btn { padding: 0.65rem 0.85rem; font-size: 1.1rem; min-height: 44px; }
    .view-btn { padding: 0.6rem 0.75rem; font-size: 1rem; min-height: 44px; }
    .compact-count { padding: 0.6rem 0.85rem; font-size: 0.95rem; min-height: 44px; }
    .alpha-btn { padding: 0.5rem 0.6rem; font-size: 0.8rem; min-height: 44px; }
    .action-btn { min-height: 44px; }
    .collection-container { grid-template-columns: repeat(3, 1fr) !important; gap: 0.5rem; }
    .version-content { grid-template-columns: 1fr; }
    .modal-body { padding: 1rem; }
}
.collection-container.mobile-view { grid-template-columns: repeat(3, 1fr) !important; }
.collection-container.list-view { grid-template-columns: 1fr !important; }
/* ===== ALPHA INDEX BAR ===== */
#alphaIndexBar {
    background: var(--ink);
    border-bottom: 1px solid var(--border-subtle);
    padding: 0.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    overflow-x: auto;
    scrollbar-width: none;
}
#alphaIndexBar::-webkit-scrollbar { display: none; }
.alpha-index-inner { display: flex; flex-wrap: wrap; gap: 0.25rem; }
.alpha-btn {
    background: transparent;
    border: 1px solid rgba(245,197,24,0.3);
    color: var(--gold-obi);
    font-family: var(--font-heading);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 0.25rem 0.5rem;
    cursor: pointer;
    border-radius: 2px;
    min-width: 1.7rem;
    text-align: center;
    transition: all 0.15s ease;
}
.alpha-btn:hover:not(:disabled) { border-color: var(--gold-obi); color: var(--gold-obi); background: rgba(245,197,24,0.08); }
.alpha-btn.active { background: var(--gold-obi); color: var(--black); border-color: var(--gold-obi); }
.alpha-btn:disabled { opacity: 0.2; cursor: default; border-color: var(--border-subtle); color: var(--text-muted); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html" style="text-decoration:none;color:inherit;display:contents;" onclick="localStorage.removeItem('obi_filter')">
                    <h1 class="site-title">
                        <i class="fas fa-compact-disc"></i>
                        US Hip Hop · Japanese Pressings
                    </h1>
                </a>
            </div>
            <div class="control-bar">
                <div class="control-row control-row-1">
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" title="Grid"><i class="fas fa-th"></i></button>
                        <button class="view-btn" data-view="list" title="List"><i class="fas fa-list"></i></button>
                    </div>
                    <select id="sortSelect" class="compact-select">
                        <option value="artist-asc">A→Z</option>
                        <option value="year-asc">Oldest</option>
                        <option value="year-desc">Newest</option>
                    </select>
                    <select id="alphabetSelect" class="compact-select">
                        <option value="">All Artists</option>
                        <option value="1980s">1980s</option>
                        <option value="1990s">1990s</option>
                        <option value="2000s">2000s</option>
                        <option value="2010s">2010s</option>
                        <option value="2020s">2020s</option>

                        <option value="soundtrack">Soundtrack</option>
                        <option value="compilation">Compilation</option>
                        <option disabled>─────</option>

                        <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                        <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                        <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                        <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                        <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                        <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                        <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                        <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                        <option value="Y">Y</option><option value="Z">Z</option>
                    </select>
                </div>
                <div class="control-row control-row-2">
                    <input type="text" id="searchInput" placeholder="Artist, Album, Year..." class="compact-search">
                    <button class="compact-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <div class="control-row control-row-3">
                    <div class="compact-count">
                        <i class="fas fa-compact-disc"></i>
                        <span id="resultCount">0</span>/<span id="totalCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="alphaIndexBar" style="display:none;">
        <div class="alpha-index-inner" id="alphaIndexInner"></div>
    </div>
    <main class="main-content">
        <div class="collection-container" id="collectionContainer"></div>
        <div class="view-size-toggle" id="viewSizeToggle">
            <button class="size-btn active" data-size="mobile"><i class="fas fa-mobile-alt"></i> Mobile</button>
            <button class="size-btn" data-size="desktop"><i class="fas fa-desktop"></i> Desktop</button>
            <button class="compact-btn" id="randomAlbumBtn" title="Random Album"><i class="fas fa-dice"></i></button>
            <button class="compact-btn" id="randomBtn" title="Back to Top"><i class="fas fa-random"></i></button>
        </div>
        <div class="loading-spinner" id="loadingSpinner">
            <i class="fas fa-compact-disc fa-spin"></i>
            <p>Loading...</p>
        </div>
        <div class="no-results" id="noResults" style="display:none;">
            <i class="fas fa-search"></i>
            <p>No CDs found</p>
        </div>
    </main>

    <div class="x-share-overlay" id="xShareOverlay">
        <img id="xShareImage" src="" alt="">
        <p>長押しして画像を保存してください</p>
        <button class="x-share-ok-btn" id="xShareOkBtn">OK</button>
    </div>

    <div class="modal" id="albumModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
// ===== APP =====
let allAlbums = [];
let filteredAlbums = [];
const isMobileUA = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
let currentView = localStorage.getItem('obi_view') || 'grid';
let viewSizeMode = localStorage.getItem('obi_size') || (isMobileUA ? 'mobile' : 'desktop');
let shuffleHistory = [];
let topPageHistory = [];
let pinnedAlbums = [];

const collectionContainer = document.getElementById('collectionContainer');
const loadingSpinner = document.getElementById('loadingSpinner');
const noResults = document.getElementById('noResults');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const randomBtn = document.getElementById('randomBtn');
const randomAlbumBtn = document.getElementById('randomAlbumBtn');
const alphabetSelect = document.getElementById('alphabetSelect');
const sortSelect = document.getElementById('sortSelect');
const albumModal = document.getElementById('albumModal');
const modalOverlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');
const modalBody = document.getElementById('modalBody');
const resultCount = document.getElementById('resultCount');
const totalCount = document.getElementById('totalCount');
const viewSizeToggle = document.getElementById('viewSizeToggle');

document.addEventListener('DOMContentLoaded', () => {
    allAlbums = COLLECTION_DATA.albums;
    // Restore saved view/size button active states
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === currentView));
    document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.dataset.size === viewSizeMode));
    collectionContainer.className = `collection-container ${currentView === 'list' ? 'list-view' : ''} ${viewSizeMode === 'mobile' ? 'mobile-view' : ''}`.trim();
    const savedFilter = localStorage.getItem('obi_filter') || '';
    if (savedFilter) {
        alphabetSelect.value = savedFilter;
        applyAlphabetFilter();
    } else {
        const displayCount = viewSizeMode === 'mobile' ? 9 : allAlbums.length;
        filteredAlbums = getRandomAlbumsForTopPage(displayCount);
        applyViewSizeLimit();
        renderAlbums();
    }
    if (totalCount) totalCount.textContent = allAlbums.length;
    showLoading(false);
    setupEventListeners();
});

function setupEventListeners() {
    searchInput.addEventListener('input', debounce(handleSearch, 300));
    searchBtn.addEventListener('click', handleSearch);
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSearch(); });
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentView = btn.dataset.view;
            localStorage.setItem('obi_view', currentView);
            collectionContainer.className = `collection-container ${currentView === 'list' ? 'list-view' : ''} ${viewSizeMode === 'mobile' ? 'mobile-view' : ''}`.trim();
        });
    });
    document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            viewSizeMode = btn.dataset.size;
            localStorage.setItem('obi_size', viewSizeMode);
            collectionContainer.classList.toggle('mobile-view', viewSizeMode === 'mobile');
            filteredAlbums = [...allAlbums];
            shuffleArray(filteredAlbums);
            applyViewSizeLimit();
            renderAlbums();
        });
    });
    randomBtn.addEventListener('click', () => {
        searchInput.value = '';
        if (alphabetSelect.value) {
            applyAlphabetFilter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
        }
        alphabetSelect.value = '';
        sortSelect.value = 'artist-asc';
        const displayCount = viewSizeMode === 'mobile' ? 9 : allAlbums.length;
        const unpinnedPositions = [];
        for (let i = 0; i < displayCount; i++) {
            if (!pinnedAlbums.find(p => p.position === i)) unpinnedPositions.push(i);
        }
        const randomAlbums = getRandomAlbumsForTopPage(unpinnedPositions.length);
        const newFilteredAlbums = new Array(displayCount);
        pinnedAlbums.forEach(pinned => { if (pinned.position < displayCount) newFilteredAlbums[pinned.position] = pinned.album; });
        let ri = 0;
        unpinnedPositions.forEach(pos => { if (ri < randomAlbums.length) newFilteredAlbums[pos] = randomAlbums[ri++]; });
        filteredAlbums = newFilteredAlbums;
        applyViewSizeLimit();
        renderAlbums();
    });
    randomAlbumBtn.addEventListener('click', showRandomAlbum);
    sortSelect.addEventListener('change', applyAlphabetFilter);
    alphabetSelect.addEventListener('change', applyAlphabetFilter);
    modalOverlay.addEventListener('click', closeModal);
    modalClose.addEventListener('click', closeModal);
    albumModal.addEventListener('click', e => { if (e.target === albumModal) closeModal(); });
}

function handleSearch() {
    const query = searchInput.value.toLowerCase().trim();
    if (query === '') {
        alphabetSelect.value = '';
        sortSelect.value = 'artist-asc';
        filteredAlbums = [...allAlbums];
        shuffleArray(filteredAlbums);
        applyViewSizeLimit();
        renderAlbums();
    } else {
        alphabetSelect.value = '';
        sortSelect.value = 'artist-asc';
        const isYearSearch = /^\d{4}$/.test(query);
        if (isYearSearch) {
            const searchYear = parseInt(query);
            filteredAlbums = allAlbums.filter(album => album.versions.some(v => v.year === searchYear));
        } else {
            filteredAlbums = allAlbums.filter(album => album.artist.toLowerCase().includes(query) || album.album.toLowerCase().includes(query));
        }
        filteredAlbums.sort((a, b) => getSortName(a.artist_sort || a.artist).toLowerCase().localeCompare(getSortName(b.artist_sort || b.artist).toLowerCase()));
        renderAlbums();
    }
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function getRandomAlbumsForTopPage(count) {
    if (topPageHistory.length >= allAlbums.length) topPageHistory = [];
    const unshown = allAlbums.filter(a => !topPageHistory.includes(a.id));
    if (unshown.length < count) {
        topPageHistory = [];
        const s = [...allAlbums];
        shuffleArray(s);
        s.slice(0, count).forEach(a => topPageHistory.push(a.id));
        return s.slice(0, count);
    }
    shuffleArray(unshown);
    const selected = unshown.slice(0, count);
    selected.forEach(a => topPageHistory.push(a.id));
    return selected;
}

function getSortName(artistName) {
    let name = artistName.trim().replace(/^(The|Tha)\s+/i, '');
    if (name === 'Snoop Doggy Dogg') name = 'Snoop Dogg';
    if (name === 'J Dilla') name = 'Jay Dee';
    return name;
}

function updateAlphaBar() {
    const bar = document.getElementById('alphaIndexBar');
    const inner = document.getElementById('alphaIndexInner');
    if (!bar || !inner) return;
    bar.style.display = '';
    if (!inner.children.length) {
        const hashBtn = document.createElement('button');
        hashBtn.className = 'alpha-btn';
        hashBtn.textContent = '#';
        hashBtn.dataset.letter = 'number';
        hashBtn.dataset.value = 'number';
        hashBtn.addEventListener('click', () => {
            alphabetSelect.value = (alphabetSelect.value === 'number') ? '' : 'number';
            sortSelect.value = 'artist-asc';
            applyAlphabetFilter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        inner.appendChild(hashBtn);
        'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'alpha-btn';
            btn.textContent = letter;
            btn.dataset.letter = letter;
            btn.dataset.value = letter;
            btn.addEventListener('click', () => {
                alphabetSelect.value = (alphabetSelect.value === letter) ? '' : letter;
                sortSelect.value = 'artist-asc';
                applyAlphabetFilter();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            inner.appendChild(btn);
        });
        [['COMP', 'compilation'], ['OST', 'soundtrack']].forEach(([label, value]) => {
            const btn = document.createElement('button');
            btn.className = 'alpha-btn';
            btn.textContent = label;
            btn.dataset.letter = value;
            btn.dataset.value = value;
            btn.addEventListener('click', () => {
                alphabetSelect.value = (alphabetSelect.value === value) ? '' : value;
                applyAlphabetFilter();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            inner.appendChild(btn);
        });
    }
    const presentLetters = new Set();
    allAlbums.forEach(album => {
        const initial = getSortName(album.artist_sort || album.artist).toUpperCase().charAt(0);
        if (initial >= 'A' && initial <= 'Z') presentLetters.add(initial);
    });
    const activeLetter = alphabetSelect.value;
    inner.querySelectorAll('.alpha-btn').forEach(btn => {
        const letter = btn.dataset.letter;
        if (letter === '') {
            btn.classList.toggle('active', activeLetter === '');
            btn.disabled = false;
        } else if (letter === 'compilation' || letter === 'soundtrack' || letter === 'number') {
            btn.classList.toggle('active', letter === activeLetter);
            btn.disabled = false;
        } else {
            btn.disabled = !presentLetters.has(letter);
            btn.classList.toggle('active', letter === activeLetter);
        }
    });
}

function applyViewSizeLimit() {
    const alphabetFilter = alphabetSelect.value;
    const isTopPage = alphabetFilter === '';
    if (viewSizeToggle) viewSizeToggle.style.display = isTopPage ? 'flex' : 'none';
    if (isTopPage && viewSizeMode === 'mobile') filteredAlbums = filteredAlbums.slice(0, 9);
}

function applyAlphabetFilter() {
    localStorage.setItem('obi_filter', alphabetSelect.value);
    filteredAlbums = [...allAlbums];
    const alphabetFilter = alphabetSelect.value;
    if (alphabetFilter === 'soundtrack') {
        filteredAlbums = filteredAlbums.filter(a => a.artist === 'O.S.T.');
        filteredAlbums.sort((a, b) => a.album.toLowerCase().localeCompare(b.album.toLowerCase()));
    } else if (alphabetFilter === 'compilation') {
        filteredAlbums = filteredAlbums.filter(a => a.artist === 'Various Artists');
        filteredAlbums.sort((a, b) => a.album.toLowerCase().localeCompare(b.album.toLowerCase()));
    } else {
        const isDecade = ['1980s','1990s','2000s','2010s','2020s'].includes(alphabetFilter);
        if (isDecade) {
            const starts = {'1980s':1980,'1990s':1990,'2000s':2000,'2010s':2010,'2020s':2020};
            const ends = {'1980s':1990,'1990s':2000,'2000s':2010,'2010s':2020,'2020s':2030};
            filteredAlbums = filteredAlbums.filter(a => { const y = a.versions[0].year; return y >= starts[alphabetFilter] && y < ends[alphabetFilter]; });
            filteredAlbums.sort((a, b) => {
                const ya = a.versions[0].year||9999, yb = b.versions[0].year||9999;
                if (ya !== yb) return ya - yb;
                return getSortName(a.artist_sort || a.artist).toLowerCase().localeCompare(getSortName(b.artist_sort || b.artist).toLowerCase());
            });
        } else if (alphabetFilter !== '') {
            if (alphabetFilter === 'number') {
                filteredAlbums = filteredAlbums.filter(a => /^[0-9]/.test(getSortName(a.artist_sort || a.artist)));
            } else {
                filteredAlbums = filteredAlbums.filter(a => getSortName(a.artist_sort || a.artist) !== "Various Artists" && getSortName(a.artist_sort || a.artist) !== "O.S.T." && getSortName(a.artist_sort || a.artist).toUpperCase().startsWith(alphabetFilter));
            }
            filteredAlbums.sort((a, b) => {
                const aa = getSortName(a.artist_sort || a.artist).toLowerCase(), ab = getSortName(b.artist_sort || b.artist).toLowerCase();
                if (aa !== ab) return aa.localeCompare(ab);
                const ya = a.versions[0].year||9999, yb = b.versions[0].year||9999;
                if (ya !== yb) return ya - yb;
                const ta = a.album.toLowerCase(), tb = b.album.toLowerCase();
                if (ta !== tb) return ta.localeCompare(tb);
                return (a.versions[0].yearJP||9999) - (b.versions[0].yearJP||9999);
            });
        } else {
            applySorting();
        }
    }
    renderAlbums();
}

function applySorting() {
    const sortValue = sortSelect.value;
    const [sortBy, sortOrder] = sortValue.split('-');
    filteredAlbums.sort((a, b) => {
        if (sortBy === 'year') {
            const ya = a.versions[0].year||9999, yb = b.versions[0].year||9999;
            if (ya !== yb) return sortOrder === 'asc' ? ya - yb : yb - ya;
            return getSortName(a.artist_sort || a.artist).toLowerCase().localeCompare(getSortName(b.artist_sort || b.artist).toLowerCase());
        } else {
            const aa = getSortName(a.artist_sort || a.artist).toLowerCase(), ab = getSortName(b.artist_sort || b.artist).toLowerCase();
            if (aa !== ab) return aa.localeCompare(ab);
            return (a.versions[0].year||9999) - (b.versions[0].year||9999);
        }
    });
}

function renderAlbums() {
    collectionContainer.innerHTML = '';
    if (filteredAlbums.length === 0) { showNoResults(true); updateResultCount(0); return; }
    showNoResults(false);
    const isTopPage = !searchInput.value && !alphabetSelect.value && sortSelect.value === 'artist-asc' && viewSizeMode === 'mobile';
    filteredAlbums.forEach((album, index) => {
        const pinnedItem = pinnedAlbums.find(p => p.position === index);
        const isPinned = pinnedItem && pinnedItem.album.id === album.id;
        collectionContainer.appendChild(createAlbumCard(album, isTopPage ? index : null, isPinned));
    });
    updateResultCount(filteredAlbums.length);
    initLazyLoading();
    updateAlphaBar();
}

function createAlbumCard(album, index = null, isPinned = false) {
    const card = document.createElement('div');
    card.className = 'album-card';
    card.dataset.albumId = album.id;
    card.dataset.sortArtist = getSortName(album.artist_sort || album.artist);
    if (index !== null) card.dataset.position = index;
    const firstVersion = album.versions[0];
    const versionCount = album.versions.length;
    card.innerHTML = `
        <div class="album-image-container">
            <img class="album-image lazy-load" data-src="${firstVersion.image}" alt="${album.album}">
            ${versionCount > 1 ? `<div class="version-badge">${versionCount} versions</div>` : ''}
            ${index !== null ? `<button class="pin-btn ${isPinned ? 'pinned' : ''}" data-album-id="${album.id}" data-position="${index}" title="${isPinned ? 'ピン留め解除' : 'ピン留め'}"><i class="fas fa-thumbtack"></i></button>` : ''}
        </div>
        <div class="album-info">
            <div class="album-artist">${album.artist}</div>
            <div class="album-title">${album.album}</div>
            <div class="album-meta"><span class="album-year"><i class="fas fa-calendar"></i> ${firstVersion.year}</span><span class="album-catalog"><i class="fas fa-barcode"></i> ${firstVersion.catalog}</span></div>
        </div>`;
    card.addEventListener('click', e => { if (!e.target.closest('.pin-btn')) showAlbumModal(album); });
    const pinBtn = card.querySelector('.pin-btn');
    if (pinBtn) pinBtn.addEventListener('click', e => { e.stopPropagation(); togglePin(album, index); });
    return card;
}

function initLazyLoading() {
    const lazyImages = document.querySelectorAll('.lazy-load');
    const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.classList.remove('lazy-load');
                obs.unobserve(img);
            }
        });
    }, { rootMargin: '50px' });
    lazyImages.forEach(img => observer.observe(img));
}

function showAlbumModal(album) {
    let versionsHTML = '';
    album.versions.forEach((version, index) => {
        const artist = album.artist.replace(/'/g, "\\'");
        const albumTitle = album.album.replace(/'/g, "\\'");
        const catalogNo = (version.catalog || '').replace(/'/g, "\\'");
        const imageUrl = version.image.replace(/'/g, "\\'");
        versionsHTML += `
            <div class="version-section ${index > 0 ? 'version-divider' : ''}">
                <div class="version-content">
                    <div class="version-image-wrapper">
                        <img src="${version.image}" alt="${album.album}" class="modal-album-image">
                    </div>
                    <div class="version-details">
                        ${version.yearJP ? `<div class="detail-row"><span class="detail-label">Japan Release</span><span class="detail-value">${version.yearJP}</span></div>` : ''}
                        ${version.catalog ? `<div class="detail-row"><span class="detail-label">Catalog No.</span><span class="detail-value">${version.catalog}</span></div>` : ''}
                        ${version.note ? `<div class="detail-row"><span class="detail-label">Note</span><span class="detail-value">${version.note}</span></div>` : ''}
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn youtube" onclick="searchOnYouTube('${artist}','${albumTitle}')"><i class="fab fa-youtube"></i> YouTube</button>
                        <button class="action-btn apple-music" onclick="searchOnAppleMusic('${artist}','${albumTitle}')"><i class="fab fa-apple"></i> Apple Music</button>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn discogs" onclick="searchOnDiscogs('${artist}','${albumTitle}')"><i class="fas fa-record-vinyl"></i> Discogs</button>
                        <button class="action-btn genius" onclick="searchOnGenius('${artist}','${albumTitle}')"><i class="fas fa-music"></i> Genius</button>
                        <button class="action-btn whosampled" onclick="searchOnWhoSampled('${artist}')"><i class="fas fa-headphones"></i> WhoSampled</button>
                        <button class="action-btn x-share" onclick="shareOnX('${artist}','${albumTitle}','${catalogNo}','${imageUrl}')"><i class="fab fa-x-twitter"></i> Post</button>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn mercari" onclick="searchOnMercari('${artist}','${albumTitle}')"><i class="fas fa-tag"></i> Mercari</button>
                        <button class="action-btn yahooauction" onclick="searchOnYahooAuction('${artist}','${albumTitle}')"><i class="fas fa-gavel"></i> Yahoo Auction</button>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn ask-ai" onclick="copyAIPrompt(this,'${artist}','${albumTitle}','${version.year}','${catalogNo}')"><i class="fas fa-copy"></i> Ask AI</button>
                    </div>
                </div>
            </div>`;
    });
    modalBody.innerHTML = `
        <div class="modal-album-container">
            <div class="modal-album-header">
                <h2>${album.artist}</h2>
                <h3>${album.album}${album.versions[0].year ? `  (${album.versions[0].year})` : ''}</h3>
            </div>
            ${versionsHTML}
        </div>`;
    modalBody.querySelectorAll('.modal-album-image').forEach(img => {
        let pressTimer;
        img.addEventListener('touchstart', () => { img.dataset.longPress = 'false'; pressTimer = setTimeout(() => { img.dataset.longPress = 'true'; }, 500); });
        img.addEventListener('touchend', () => { clearTimeout(pressTimer); setTimeout(() => { img.dataset.longPress = 'false'; }, 100); });
        img.addEventListener('touchmove', () => clearTimeout(pressTimer));
    });
    albumModal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() { albumModal.classList.remove('active'); document.body.style.overflow = 'auto'; }

function openClaude(artist, albumTitle, year, catalog) {
    const prompt = `このアルバムについて、下記の構成で日本語で教えてください。\nテーブル形式・マークダウンテーブルは絶対に使わないでください。すべて箇条書きか文章で書いてください。\n\n【アルバム紹介】\n・作品の概要（リリース背景、位置づけ）\n・主なプロデューサー陣と全体のサウンドの特徴\n・主な客演ラッパー・シンガー一覧\n・ヒップホップシーンにおける評価・影響\n\n【収録曲ガイド】\n各曲を必ず以下のフォーマットで、縦に並べて記載してください：\n\n1. 曲名\nプロデューサー：xxx\n客演：xxx（いない場合は省略）\n聴きどころ：xxx\n\n2. 曲名\nプロデューサー：xxx\n...\n\nアーティスト：${artist}\nアルバム：${albumTitle}\nリリース：${year}\nレーベル：\nカタログ番号：${catalog}\n収録曲：`;
    window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank');
}

function copyAIPrompt(btn, artist, albumTitle, year, catalog) {
    const prompt = `このアルバムについて、下記の構成で日本語で教えてください。\nマークダウンテーブルは絶対に使わないでください。見出しは##（大セクション）・###（小セクション）を使ってください。本文は箇条書きか文章で書いてください。\n先頭に字下げ（インデント）を入れないこと。すべて左揃えで出力すること。\n\n各曲のプロデューサー・ゲスト情報は、Discogs・WhoSampled・AllMusic・Wikipediaなど複数のソースを検索して可能な限り正確に埋めること。時間がかかっても構わないので、不明のまま放置しないこと。\n\nパンチラインの紹介は一切しないこと。フックが存在する曲のみ、フック全体の英語歌詞と日本語訳を紹介すること（途中で切らないこと）。フックがない曲はその項目自体を省略すること。\n\nサウンドトラック作品の場合、監督名は記載しないこと。\n\n「クリスプ」「シルキー」「シミリー」「BAR」など日本語のヒップホップシーンで一般的でない英語カタカナ表現は使わないこと。「サイファー」など日本のヒップホップシーンに定着している言葉は使って構わない。\n\nWikipedia・Albumism・AllMusicなどの出典名は本文中に記載しないこと。\n\nサンプリングネタを言及する場合は「アーティスト名の「曲名」」という形式で統一すること（例：Brother to Brotherの「The Affair」をサンプリングした）。\n\nアーティストの本名を括弧書きで添えないこと（例：「Illa J（本名John Yancey）」のような表記は不要）。\n\n英語の直訳的・翻訳調の言い回しを避け、自然な日本語で書くこと。\n\n評価・影響のセクションでは断定を避け、裏付けの強さに応じた言い方にすること（「〜とも言える」「〜という声もある」「〜が根強い」など）。\n\n文体は全体を通じて落ち着いた記事体で統一すること。「最強の年」「圧巻」「ノリノリ」など感情的・口語的な表現は使わないこと。\n\n日本語の一般読者に馴染みのないカタカナ学術用語・批評用語は使わないこと。「ユーロセントリック」「ダイアスポラ」「ヘゲモニー」「ポストコロニアル」などは平易な日本語に言い換えること。\n\n出力の冒頭は「アーティスト名『アルバムタイトル』——日本語サブタイトル」の構成で始めること（例：「50 Cent『Before I Self Destruct』——街に戻った男の剥き出しの自画像」）。ダッシュは全角ダッシュ2つ（——）を使うこと。サブタイトルは読者がnoteで読みたくなるような日本語にすること。\n\n## アルバム紹介\n### 作品の概要\n\n### 主なプロデューサー陣と全体のサウンドの特徴\n（各プロデューサーを箇条書きで列挙、担当曲名は不要）\n\n### ヒップホップシーンにおける評価・影響\n\n## 収録曲ガイド\n各曲を必ず以下のフォーマットで記載し、各曲の間には必ず横棒（---）を入れること。\n曲名・プロデューサー・ゲスト・解説・フックはそれぞれ必ず改行で区切ること。\n本文はすべて一文ごとに改行すること。複数の文を続けて書かないこと。\nゲストアーティストがいない曲は「〇〇独演」などと書かず、ゲストの行自体を省略すること。\n\n### 1. 曲名\nプロデューサー：xxx\nゲスト：xxx（いない場合は省略）\nトラック解説文\nフック："英語歌詞"\n（日本語訳）（フックがない曲は省略）\n\n---\n\nアーティスト：${artist}\nアルバム：${albumTitle}\nリリース：${year}\nレーベル：\nカタログ番号：${catalog}\n収録曲：`;
    navigator.clipboard.writeText(prompt).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '<i class="fas fa-check"></i> プロンプトをコピーしました';
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<i class="fas fa-copy"></i> Ask AI';
        }, 2000);
    });
}

function togglePin(album, position) {
    const existingPinIndex = pinnedAlbums.findIndex(p => p.position === position);
    if (existingPinIndex >= 0) pinnedAlbums.splice(existingPinIndex, 1);
    else pinnedAlbums.push({ album, position });
    renderAlbums();
}

function showRandomAlbum() {
    if (!allAlbums.length) return;
    if (shuffleHistory.length >= allAlbums.length) shuffleHistory = [];
    const unshown = allAlbums.filter(a => !shuffleHistory.includes(a.id));
    const random = unshown[Math.floor(Math.random() * unshown.length)];
    shuffleHistory.push(random.id);
    showAlbumModal(random);
}

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

function searchOnYouTube(artist, album) {
    const q = encodeURIComponent(`${artist} ${album}`);
    if (isMobile) { window.location.href = `vnd.youtube://results?search_query=${q}`; setTimeout(() => window.open(`https://www.youtube.com/results?search_query=${q}`, '_blank'), 1000); }
    else window.open(`https://www.youtube.com/results?search_query=${q}`, '_blank');
}

function searchOnAppleMusic(artist, album) {
    const q = encodeURIComponent(`${artist} ${album}`);
    if (isMobile) { window.location.href = `music://music.apple.com/search?term=${q}`; setTimeout(() => window.open(`https://music.apple.com/search?term=${q}`, '_blank'), 1000); }
    else window.open(`https://music.apple.com/search?term=${q}`, '_blank');
}

function openSearch(url) { window.open(url, '_blank'); }
function searchOnDiscogs(artist, album) { const q = artist === 'Various Artists' ? album : `${artist} ${album}`; openSearch(`https://www.discogs.com/search/?q=${encodeURIComponent(q)}&type=all`); }
function searchOnGenius(artist, album) { openSearch(`https://genius.com/search?q=${encodeURIComponent(`${artist} ${album}`)}`); }
function searchOnMercari(artist, album) { openSearch(`https://jp.mercari.com/search?keyword=${encodeURIComponent(`${artist} ${album}`)}`); }
function searchOnYahooAuction(artist, album) {
    const q = encodeURIComponent(`${artist} ${album}`);
    openSearch(`https://auctions.yahoo.co.jp/search/search?p=${q}`);
}
function searchOnWhoSampled(artist) { openSearch(`https://www.whosampled.com/search/?q=${encodeURIComponent(artist)}`); }
function shareOnX(artist, album, catalog, imageUrl) {
    const overlay = document.getElementById('xShareOverlay');
    const img = document.getElementById('xShareImage');
    const okBtn = document.getElementById('xShareOkBtn');
    img.src = imageUrl;
    overlay.classList.add('active');
    okBtn.onclick = () => {
        overlay.classList.remove('active');
        const text = `${artist} - ${album}`;
        openSearch(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`);
    };
}

function showLoading(show) { loadingSpinner.style.display = show ? 'block' : 'none'; }
function showNoResults(show) { noResults.style.display = show ? 'block' : 'none'; }
function updateResultCount(count) { if (resultCount) resultCount.textContent = count; }

function debounce(func, wait) {
    let timeout;
    return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => { clearTimeout(timeout); func(...args); }, wait);
    };
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        if (albumModal.classList.contains('active')) closeModal();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
    if (e.key === 'r' && !searchInput.matches(':focus')) showRandomAlbum();
});
